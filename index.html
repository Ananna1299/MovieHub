<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

   <!-- CSS files -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animation.css">


    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <title>Movie Watchlist</title>
</head>
<body>

    <header class="set-width">

        <nav class="nav-container">
            <div class="nav-div">
                <figure id="logo-img">
                <img src="./assets/logo.png" alt="logo">
            </figure>
            <h3 class="Noto">Movie <span style="color:#60ab91 ;">Hub</span></h3>

            </div>

        <form id="search-form">
           <input type="text" id="search-input" placeholder="Search movies..." required>
            <button class="btn" type="submit">Search</button>
         </form>

         
            
        </nav>

    </header>


    <main style="min-height: 90vh;">
        <div class="set-width movieHolder">
            <section id="movieSection">
                <h2 class="heading">🍿Movies</h2>

              

              <div style="display: flex; align-items: center; justify-content: space-between; gap: 3px;
              margin-right: 10px;">

                <!-- filter option -->
                <div style="display: flex; align-items: center; gap: 3px;">
                <h4>Filter by Genre</h4>
                <select id="typeFilter">
                            <option value="all">All</option>
                            <option value="movie">Movie</option>
                            <option value="series">Series</option>
                            <option value=" episode">Episode</option>
                </select>

              </div>
               <!-- layout options -->
              <div style="display: flex; align-items: center; gap: 3px; ">
                
                <button class="btn" id="toggle-grid">List</button>

              </div>
              </div>
              
                




               <div id="movieContainer" class="add-class">

                
                
               </div>
           </section>

           

            <aside id="wishListSection">
                <h2 class="heading">🎬Watchlist (<span id="watchCount">0</span>)</h2>
                <ul id="watchlist"></ul>
            </aside>
        </div>


        
        
    </main>

    <!-- pagination -->

    <section id="pagination">
                <button id="prevBtn" class="btn" disabled>⬅ Prev</button>
                <span id="pageNumber">Page 1</span>
                <button id="nextBtn" class="btn">Next ➡</button>
    </section>

    
    <footer class="footer">
     <div class="footerContainer">
        

        <div class="nav-div">
                <figure id="logo-img">
                <img src="./assets/logo.png" alt="logo">
            </figure>
            <h3 class="Noto">Movie <span style="color:white ;">Hub</span></h3>
            

            </div>

            <h2> <span style="color: white ;">𝄞⨾💿✮˚.⋆ Ananna Paul  𝄞⨾💿✮˚.⋆</span></h2>
            <button class="theme-toggle" id="themeToggle-id">🌙</button>

     </div>
    </footer>


    <!-- modal -->
     
        <dialog id="movieModal">
        <div id="modalContent"></div>
        <button id="closeModal" class="btn">Close</button>
    </dialog>
    


<script type="module" src="js/app.js"></script>
<script type="module" src="js/hoisting.js"></script>
</body>
</html>
